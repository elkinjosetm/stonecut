name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(bun -e "const p = await Bun.file('package.json').json(); console.log(p.version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Install dependencies
        if: steps.check_release.outputs.exists == 'false'
        run: bun install --frozen-lockfile

      # setup-node with registry-url writes an .npmrc containing
      # _authToken=${NODE_AUTH_TOKEN} and exports NODE_AUTH_TOKEN with a
      # placeholder value (XXXXX-XXXXX-XXXXX-XXXXX).  That placeholder
      # causes npm to attempt token auth instead of the OIDC credential
      # exchange required by trusted publishers, producing a 404 error.
      # Stripping the _authToken line from .npmrc lets npm fall through
      # to OIDC.  We also set NODE_AUTH_TOKEN to empty to override the
      # exported placeholder.
      - name: Publish to npm
        if: steps.check_release.outputs.exists == 'false'
        env:
          HUSKY: 0
          NODE_AUTH_TOKEN: ''
        run: |
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          npm publish --provenance --access public
